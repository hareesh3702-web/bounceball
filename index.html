<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Classic Bounce Quest</title>
  <meta name="description" content="A classic Nokia Bounce-inspired HTML5 Canvas game with 25 levels.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-shell">
    <header class="hud-top">
      <div class="brand">CLASSIC BOUNCE QUEST</div>
      <div class="hud-stats">
        <span id="hudLevel">LV 1</span>
        <span id="hudLives">❤ 3</span>
        <span id="hudCoins">○ 0/0</span>
        <span id="hudScore">SCORE 0</span>
        <button id="pauseBtn" class="hud-btn">PAUSE</button>
      </div>
    </header>

    <main class="stage-wrap">
      <div class="touch-zones" id="touchZones" aria-hidden="true">
        <button class="tap-zone zone-left" data-touch-zone="left">Left</button>
        <button class="tap-zone zone-jump" data-touch-zone="jump">Jump</button>
        <button class="tap-zone zone-right" data-touch-zone="right">Right</button>
      </div>
      <canvas id="gameCanvas" width="960" height="540"></canvas>

      <div id="menuOverlay" class="overlay visible">
        <div class="menu-card">
          <h1>CLASSIC BOUNCE QUEST</h1>
          <p>Roll, bounce, jump through rings, collect coins, unlock the exit, and survive all 25 levels.</p>
          <div class="menu-actions">
            <button data-action="start">START</button>
            <button data-action="continue">CONTINUE</button>
            <button data-action="levels">LEVEL SELECT</button>
            <button data-action="toggle-settings">SETTINGS</button>
          </div>
          <div id="levelSelect" class="level-select hidden"></div>
          <div id="settingsPanel" class="settings hidden">
            <label>Music <input id="musicVolume" type="range" min="0" max="1" step="0.05" value="0.4"></label>
            <label>SFX <input id="sfxVolume" type="range" min="0" max="1" step="0.05" value="0.75"></label>
            <label><input id="muteToggle" type="checkbox"> Mute</label>
            <label><input id="resetSave" type="checkbox"> Arm reset save</label>
            <button data-action="apply-settings">APPLY</button>
            <button data-action="reset-progress">RESET PROGRESS</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="mobile-controls">
      <button data-touch="left">◀</button>
      <button data-touch="jump">▲</button>
      <button data-touch="right">▶</button>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
